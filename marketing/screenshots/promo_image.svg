  <line x1="200" y1="76" x2="240" y2="76" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="92" x2="232" y2="92" stroke="#8b8f96" stroke-width="2" stroke-linecap="round"/>
