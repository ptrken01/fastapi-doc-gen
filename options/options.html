<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FastAPI Doc Gen — Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #0f1117; color: #e4e6eb; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .option-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #2d3139; background: #1a1d24; color: #e4e6eb; }
    button { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #2563eb; }
    .note { font-size: 11px; color: #8b8f96; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>FastAPI Doc Gen — Options</h1>
  <div class="option-group">
    <label for="extensionpay-id">ExtensionPay Extension ID</label>
    <input type="text" id="extensionpay-id" placeholder="e.g. fastapi-doc-gen">
    <div class="note">Find this in your ExtensionPay dashboard. Required for purchase verification.</div>
  </div>
  <button id="save-btn">Save</button>
  <div id="saved" style="display:none; color:#22c55e; margin-top:8px;">Saved!</div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      chrome.storage.local.get(['extensionpayId'], (result) => {
        if (result.extensionpayId) {
          document.getElementById('extensionpay-id').value = result.extensionpayId;
        }
      });

      document.getElementById('save-btn').addEventListener('click', () => {
        const id = document.getElementById('extensionpay-id').value;
        chrome.storage.local.set({ extensionpayId: id }, () => {
          document.getElementById('saved').style.display = 'block';
          setTimeout(() => document.getElementById('saved').style.display = 'none', 2000);
        });
      });
    });
  </script>
</body>
</html>
